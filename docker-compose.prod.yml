# Constellation A2A - Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file hardens the deployment for production use:
# - Uses the hardened Conduit config
# - Restricts resource usage
# - Drops unnecessary capabilities
# - Keeps all traffic on an internal network
# - Adds logging limits

services:
  conduit:
    build:
      context: ./conduit
      dockerfile: Dockerfile
    volumes:
      - ./conduit/conduit-hardened.toml:/etc/conduit/conduit.toml:ro
      - conduit_data:/var/lib/conduit
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - constellation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent-coordinator:
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - constellation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent-researcher:
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - constellation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent-coder:
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - constellation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  constellation:
    driver: bridge
    internal: true

volumes:
  conduit_data:
